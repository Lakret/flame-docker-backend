name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1.24.0
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check formatting of test_apps/minimal
        run: (cd test_apps/minimal && mix format --check-formatted)

      - name: Check formatting of test_apps/phx_minimal
        run: (cd test_apps/phx_minimal && mix deps.get && mix format --check-formatted)

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1.24.0
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Verify Docker
        run: docker info

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Integration tests
        run: MIX_ENV=test mix test.docker

  publish:
    runs-on: ubuntu-latest
    needs: [test, integration]

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1.24.0
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Install dependencies
        run: mix deps.get

      - name: Verify tag matches mix version
        run: |
          VERSION="$(mix eval 'IO.write(Mix.Project.config()[:version])')"

          if [ "$GITHUB_REF_NAME" != "v$VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match mix.exs version v$VERSION"
            exit 1
          fi

      - name: Build docs
        run: mix docs

      - name: Build Hex package
        run: mix hex.build

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          gh release create "$GITHUB_REF_NAME" \
            "flame_docker_backend-$VERSION.tar" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
