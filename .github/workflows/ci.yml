name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1.24.0
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1.24.0
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Verify Docker
        run: docker info

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Integration tests
        run: MIX_ENV=test mix test.docker
